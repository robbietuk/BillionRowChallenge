name: Build and Test (CMake Matrix)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test (${{ matrix.config }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake
      - name: Configure (${{ matrix.config }})
        run: cmake -S . -B build-${{ matrix.config }} -DCMAKE_BUILD_TYPE=${{ matrix.config }}
      - name: Build (${{ matrix.config }})
        run: cmake --build build-${{ matrix.config }}
      - name: Test (${{ matrix.config }})
        run: ctest --test-dir build-${{ matrix.config }} || true
