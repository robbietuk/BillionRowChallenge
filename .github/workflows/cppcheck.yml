name: Cppcheck

on:
  push:
    paths:
      - '**.cpp'
      - '**.c'
      - '**.h'
      - '**.hpp'
  pull_request:
    paths:
      - '**.cpp'
      - '**.c'
      - '**.h'
      - '**.hpp'

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: cppcheck --enable=all --inconclusive --quiet --error-exitcode=1 -I source/lib -I source/development .
